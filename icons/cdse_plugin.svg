<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#003399"/>

  <!-- Stars representing EU/Copernicus -->
  <g fill="#FFCC00">
    <circle cx="32" cy="10" r="2"/>
    <circle cx="44" cy="14" r="2"/>
    <circle cx="52" cy="24" r="2"/>
    <circle cx="54" cy="36" r="2"/>
    <circle cx="50" cy="48" r="2"/>
    <circle cx="40" cy="54" r="2"/>
    <circle cx="24" cy="54" r="2"/>
    <circle cx="14" cy="48" r="2"/>
    <circle cx="10" cy="36" r="2"/>
    <circle cx="12" cy="24" r="2"/>
    <circle cx="20" cy="14" r="2"/>
  </g>

  <!-- Satellite icon -->
  <g transform="translate(22, 22)" fill="#FFFFFF">
    <!-- Main body -->
    <rect x="6" y="6" width="8" height="8" rx="1"/>
    <!-- Solar panels -->
    <rect x="0" y="8" width="5" height="4" rx="0.5"/>
    <rect x="15" y="8" width="5" height="4" rx="0.5"/>
    <!-- Antenna -->
    <line x1="10" y1="6" x2="10" y2="2" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="10" cy="1" r="1.5"/>
  </g>
</svg>
